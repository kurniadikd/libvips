name: Build libvips for Linux

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            meson \
            pkg-config \
            nasm \
            yasm \
            gcc-13 \
            g++-13 \
            libglib2.0-dev \
            libexpat1-dev \
            libpng-dev \
            libjpeg-turbo8-dev \
            libwebp-dev \
            libzstd-dev \
            libde265-dev \
            libgif-dev \
            libbrotli-dev

      - name: Compile Standard libaom (AV1 Support)
        run: |
          git clone https://aomedia.googlesource.com/aom
          cd aom
          git checkout v3.13.1
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 \
            -DCONFIG_PIC=1 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile AVM (AV2 Reference Software - Isolated)
        run: |
          git clone https://github.com/AOMediaCodec/avm.git
          cd avm
          git checkout research-v9.0.0
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 \
            -DCONFIG_PIC=1 \
            -DENABLE_WERROR=0 \
            -DCMAKE_C_FLAGS="-w" \
            -DCMAKE_CXX_FLAGS="-w" \
            -DENABLE_DOCS=0 \
            -DENABLE_EXAMPLES=0 \
            -DENABLE_TESTS=0 \
            -DENABLE_TOOLS=0 \
            -DCMAKE_INSTALL_PREFIX=/usr/local/avm \
            ..
          ninja
          sudo ninja install
          sudo mkdir -p /usr/local/avm/include/aom/config
          sudo cp config/aom_config.h /usr/local/avm/include/aom/config/aom_config.h
          sudo cp config/aom_config.h /usr/local/avm/include/aom/aom_config.h
          cd ../..

      - name: Compile vvdec (VVC Decoder)
        run: |
          git clone https://github.com/fraunhoferhhi/vvdec.git
          cd vvdec
          git checkout v2.3.0
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 \
            -DCONFIG_PIC=1 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile vvenc (VVC Encoder)
        run: |
          git clone https://github.com/fraunhoferhhi/vvenc.git
          cd vvenc
          git checkout v1.13.0
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=0 \
            -DCONFIG_PIC=1 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile Jpegli (via libjxl)
        run: |
          git clone --recursive https://github.com/libjxl/libjxl.git
          cd libjxl
          git checkout v0.11.0
          git submodule update --init --recursive --jobs 8
          mkdir build && cd build
          cmake -G Ninja .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DJPEGXL_INSTALL_JPEGLI_LIBJPEG=ON \
            -DJPEGLI_LIBJPEG_LIBRARY_VERSION=8.2.2 \
            -DJPEGLI_LIBJPEG_LIBRARY_SOVERSION=8 \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          ninja
          sudo ninja install
          sudo ldconfig
          cd ../..

      - name: Compile libheif with AV1 and VVC
        run: |
          git clone https://github.com/strukturag/libheif.git
          cd libheif
          git checkout v1.17.6
          
          # Fix: Jpegli defines LIBJPEG_TURBO_VERSION_NUMBER empty, breaking example tools
          sed -i 's/defined(LIBJPEG_TURBO_VERSION_NUMBER) && LIBJPEG_TURBO_VERSION_NUMBER == 2000000/0/g' examples/decoder_jpeg.cc
          
          mkdir build_dir && cd build_dir
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_PLUGIN_LOADING=OFF \
            -DWITH_VVDEC=ON \
            -DWITH_VVENC=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile libvips with custom libheif
        run: |
          git clone https://github.com/libvips/libvips.git
          cd libvips
          git checkout v8.15.2
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          sudo apt-get remove -y libjpeg-turbo8-dev libjpeg-dev || true
          meson setup build_dir \
            --buildtype=release \
            --prefix=/usr/local \
            -Dpdfium=disabled
          cd build_dir
          ninja
          sudo ninja install
          cd ../..

      - name: Bundle and Package libvips Linux binaries
        run: |
          mkdir -p dist/lib dist/include dist/av2
          cp -d /usr/local/lib/libvips.so* dist/lib/
          cp -d /usr/local/lib/libheif.so* dist/lib/
          cp -d /usr/local/lib/libjpeg.so* dist/lib/ || true
          cp -d /usr/local/lib/libjxl.so* dist/lib/ || true
          cp -d /usr/local/lib/libjxl_threads.so* dist/lib/ || true
          cp -d /usr/local/lib/libjxl_cms.so* dist/lib/ || true
          cp -r /usr/local/include/vips dist/include/
          cp -r /usr/local/avm/* dist/av2/ || true
          tar -czf libvips-linux.tar.gz dist/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libvips-linux
          path: libvips-linux.tar.gz
