name: Build libvips for Linux

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-24.04 # Use a modern Ubuntu release
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            meson \
            pkg-config \
            nasm \
            libglib2.0-dev \
            libexpat1-dev \
            libpng-dev \
            libjpeg-turbo8-dev \
            libwebp-dev \
            libzstd-dev \
            libde265-dev

      - name: Compile AVM (AV2 Codec Reference Software)
        run: |
          git clone https://github.com/AOMediaCodec/avm.git
          cd avm
          git checkout research-v9.0.0
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCONFIG_PIC=ON \
            -DENABLE_WERROR=OFF \
            -DENABLE_DOCS=OFF \
            -DENABLE_EXAMPLES=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_TOOLS=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile vvdec (VVC Decoder)
        run: |
          git clone https://github.com/fraunhoferhhi/vvdec.git
          cd vvdec
          git checkout v2.3.0
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCONFIG_PIC=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile vvenc (VVC Encoder)
        run: |
          git clone https://github.com/fraunhoferhhi/vvenc.git
          cd vvenc
          git checkout v1.13.0
          mkdir build_dir && cd build_dir
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCONFIG_PIC=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile libheif with AVM and VVC
        run: |
          git clone https://github.com/strukturag/libheif.git
          cd libheif
          git checkout v1.17.6
          mkdir build_dir && cd build_dir
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_PLUGIN_LOADING=OFF \
            -DWITH_VVDEC=ON \
            -DWITH_VVENC=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            ..
          ninja
          sudo ninja install
          cd ../..

      - name: Compile libvips with custom libheif
        run: |
          git clone https://github.com/libvips/libvips.git
          cd libvips
          git checkout v8.15.2
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          meson setup build_dir \
            --buildtype=release \
            --prefix=/usr/local \
            -Dpdfium=disabled \
            -Dcglesv2=disabled
          cd build_dir
          ninja
          sudo ninja install
          cd ../..

      - name: Bundle and Package libvips Linux binaries
        run: |
          mkdir -p dist/lib dist/include
          # Copy compiled libraries
          cp -d /usr/local/lib/libvips.so* dist/lib/
          cp -d /usr/local/lib/libheif.so* dist/lib/
          cp -r /usr/local/include/vips dist/include/
          
          # Compress the distribution package
          tar -czf libvips-linux.tar.gz dist/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libvips-linux
          path: libvips-linux.tar.gz
