name: Build libvips for Windows

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl sed jq python3

      - name: Clone libvips/build-win64-mxe
        run: |
          git clone https://github.com/libvips/build-win64-mxe.git
          cd build-win64-mxe
          git checkout master

      - name: Fetch and calculate checksums for dependencies
        id: checksums
        run: |
          # AVM (AV2)
          AVM_TAG="research-v9.0.0"
          AVM_TARBALL_URL="https://github.com/AOMediaCodec/avm/archive/refs/tags/${AVM_TAG}.tar.gz"
          curl -L -o avm.tar.gz "$AVM_TARBALL_URL"
          AVM_CHECKSUM=$(sha256sum avm.tar.gz | awk '{print $1}')
          echo "avm_checksum=${AVM_CHECKSUM}" >> $GITHUB_OUTPUT
          
          # vvdec (VVC Decoder)
          VVDEC_VERSION="2.3.0"
          curl -L -o vvdec.tar.gz "https://github.com/fraunhoferhhi/vvdec/archive/refs/tags/v${VVDEC_VERSION}.tar.gz"
          VVDEC_CHECKSUM=$(sha256sum vvdec.tar.gz | awk '{print $1}')
          echo "vvdec_checksum=${VVDEC_CHECKSUM}" >> $GITHUB_OUTPUT
          
          # vvenc (VVC Encoder)
          VVENC_VERSION="1.13.0"
          curl -L -o vvenc.tar.gz "https://github.com/fraunhoferhhi/vvenc/archive/refs/tags/v${VVENC_VERSION}.tar.gz"
          VVENC_CHECKSUM=$(sha256sum vvenc.tar.gz | awk '{print $1}')
          echo "vvenc_checksum=${VVENC_CHECKSUM}" >> $GITHUB_OUTPUT

      - name: Patch MXE aom recipe for AVM (AV2)
        run: |
          cd build-win64-mxe
          
          AVM_VERSION="9.0.0"
          AVM_CHECKSUM="${{ steps.checksums.outputs.avm_checksum }}"
          
          # Replace fields in build/aom.mk
          sed -i "s|\$(PKG)_VERSION  :=.*|\$(PKG)_VERSION  := ${AVM_VERSION}|" build/aom.mk
          sed -i "s|\$(PKG)_CHECKSUM :=.*|\$(PKG)_CHECKSUM := ${AVM_CHECKSUM}|" build/aom.mk
          sed -i "s|\$(PKG)_SUBDIR   :=.*|\$(PKG)_SUBDIR   := avm-research-v\$(\$(PKG)_VERSION)|" build/aom.mk
          sed -i "s|\$(PKG)_FILE     :=.*|\$(PKG)_FILE     := avm-research-v\$(\$(PKG)_VERSION).tar.gz|" build/aom.mk
          sed -i "s|\$(PKG)_URL      :=.*|\$(PKG)_URL      := https://github.com/AOMediaCodec/avm/archive/refs/tags/research-v\$(\$(PKG)_VERSION).tar.gz|" build/aom.mk
          
          # Disable standard patches as they will fail on AVM
          sed -i "s|\$(PKG)_PATCHES  :=.*|\$(PKG)_PATCHES  :=|" build/aom.mk
          
          # Patch cpuinfo max error in aom.mk
          python3 - << 'EOF'
          with open("build/aom.mk", "r") as f:
              content = f.read()
          
          patch_cmd = (
              "    sed -i 's|#include <windows.h>|#include <windows.h>\\n"
              "#ifndef max\\n#define max(a,b) (((a) > (b)) ? (a) : (b))\\n#endif|' "
              "'$(BUILD_DIR)/_deps/cpuinfo-src/src/x86/windows/init.c' || true\n"
          )
          content = content.replace("    # parallel build sometimes doesn't work", patch_cmd + "    # parallel build sometimes doesn't work")
          
          with open("build/aom.mk", "w") as f:
              f.write(content)
          EOF
          
          echo "=== Modified build/aom.mk ==="
          cat build/aom.mk

      - name: Add vvdec and vvenc MXE recipes
        run: |
          cd build-win64-mxe
          python3 - << 'EOF'
          import textwrap

          vvdec_content = textwrap.dedent("""\
              PKG             := vvdec
              $(PKG)_WEBSITE  := https://github.com/fraunhoferhhi/vvdec
              $(PKG)_DESCR    := Fraunhofer HHI VVC Decoder
              $(PKG)_IGNORE   :=
              $(PKG)_VERSION  := 2.3.0
              $(PKG)_CHECKSUM := ${{ steps.checksums.outputs.vvdec_checksum }}
              $(PKG)_PATCHES  :=
              $(PKG)_SUBDIR   := vvdec-$($(PKG)_VERSION)
              $(PKG)_FILE     := vvdec-$($(PKG)_VERSION).tar.gz
              $(PKG)_URL      := https://github.com/fraunhoferhhi/vvdec/archive/refs/tags/v$($(PKG)_VERSION).tar.gz
              $(PKG)_DEPS     := cc

              define $(PKG)_BUILD
                  cd '$(BUILD_DIR)' && $(TARGET)-cmake \\
                      -DBUILD_SHARED_LIBS=OFF \\
                      -DCONFIG_PIC=ON \\
                      '$(SOURCE_DIR)'
                  $(MAKE) -C '$(BUILD_DIR)' -j '$(JOBS)'
                  $(MAKE) -C '$(BUILD_DIR)' -j 1 $(subst -,/,$(INSTALL_STRIP_LIB))
              endef
          """)
          with open("build/vvdec.mk", "w") as f:
              f.write(vvdec_content)

          vvenc_content = textwrap.dedent("""\
              PKG             := vvenc
              $(PKG)_WEBSITE  := https://github.com/fraunhoferhhi/vvenc
              $(PKG)_DESCR    := Fraunhofer HHI VVC Encoder
              $(PKG)_IGNORE   :=
              $(PKG)_VERSION  := 1.13.0
              $(PKG)_CHECKSUM := ${{ steps.checksums.outputs.vvenc_checksum }}
              $(PKG)_PATCHES  :=
              $(PKG)_SUBDIR   := vvenc-$($(PKG)_VERSION)
              $(PKG)_FILE     := vvenc-$($(PKG)_VERSION).tar.gz
              $(PKG)_URL      := https://github.com/fraunhoferhhi/vvenc/archive/refs/tags/v$($(PKG)_VERSION).tar.gz
              $(PKG)_DEPS     := cc

              define $(PKG)_BUILD
                  cd '$(BUILD_DIR)' && $(TARGET)-cmake \\
                      -DBUILD_SHARED_LIBS=OFF \\
                      -DCONFIG_PIC=ON \\
                      '$(SOURCE_DIR)'
                  $(MAKE) -C '$(BUILD_DIR)' -j '$(JOBS)'
                  $(MAKE) -C '$(BUILD_DIR)' -j 1 $(subst -,/,$(INSTALL_STRIP_LIB))
              endef
          """)
          with open("build/vvenc.mk", "w") as f:
              f.write(vvenc_content)
          EOF

      - name: Patch libheif recipe for VVC support
        run: |
          cd build-win64-mxe
          python3 -c '
          with open("build/libheif.mk", "r") as f:
              content = f.read()
          content = content.replace("$(PKG)_DEPS     := cc aom", "$(PKG)_DEPS     := cc aom vvdec vvenc")
          content = content.replace(
              "-DENABLE_PLUGIN_LOADING=0 \\",
              "-DENABLE_PLUGIN_LOADING=0 \\\n        -DWITH_VVDEC=ON \\\n        -DWITH_VVENC=ON \\"
          )
          with open("build/libheif.mk", "w") as f:
              f.write(content)
          '
          echo "=== Modified build/libheif.mk ==="
          cat build/libheif.mk

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build libvips using MXE
        run: |
          cd build-win64-mxe
          # Run the build script targeting x86_64 shared build
          ./build.sh vips-web x86_64 shared

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libvips-windows
          path: build-win64-mxe/packaging/*.zip
